<!DOCTYPE html>
<html lang="en" data-theme="springfield">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#ffd521">
<title>D'oh-nut Album — The Simpsons Sticker Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   THEME ENGINE & CSS
   ============================================================ */
:root{
  --rail: 196px; --col-min: 154px; --radius: 16px; --radius-sm: 10px;
  --font: "Comic Sans MS", "Chalkboard SE", "Marker Felt", system-ui, sans-serif;
  --sky:#7ec0ee; --bg:#dff1ff; --pnl:#ffffff; --pnl2:#f1f8ff; --ink:#16242f; --mut:#5d7689; --ln:#cfe4f4;
  --acc:#ffd521; --accInk:#3a2e00; --acc2:#3f9bd6; --gold:#ffcf33; --goldDeep:#d99a00; --good:#54bf3a; --bad:#e8533a;
  --hdr: linear-gradient(180deg,#79c0ff 0%,#bfe3ff 100%); --chip:#eef6ff; --shadow: 0 6px 18px rgba(20,60,90,.16); --cloud:1;
}
html[data-theme="night"]{
  --sky:#1e293b; --bg:#0f172a; --pnl:#1e293b; --pnl2:#334155; --ink:#f8fafc; --mut:#cbd5e1; --ln:#475569;
  --acc:#ffd521; --accInk:#3a2e00; --acc2:#3f9bd6; --gold:#ffcf33; --goldDeep:#d99a00; --good:#54bf3a; --bad:#e8533a;
  --hdr: linear-gradient(180deg,#1e293b 0%,#0f172a 100%); --chip:#475569; --shadow: 0 6px 18px rgba(0,0,0,.6); --cloud:0;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{font-family:var(--font); background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; overflow:hidden; transition:background .4s ease,color .4s ease;}
button,input,select{font-family:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
::-webkit-scrollbar{height:11px;width:11px}
::-webkit-scrollbar-thumb{background:var(--acc2);border-radius:20px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-track{background:transparent}
.hidden{display:none !important}

/* NIGHT SKY */
.night-sky-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0; transition: opacity 0.6s ease; overflow: hidden; }
html[data-theme="night"] .night-sky-bg { opacity: 1; }
.night-sky-bg .star { position: absolute; color: #FFF; font-size: 12px; animation: twinkle linear infinite; text-shadow: 0 0 4px #FFF, 0 0 10px var(--gold); }
.star:nth-child(1) { top: 10%; left: 15%; font-size: 16px; animation-duration: 3s; }
.star:nth-child(2) { top: 25%; left: 85%; font-size: 10px; animation-duration: 4s; animation-delay: 1s; }
.star:nth-child(3) { top: 40%; left: 50%; font-size: 20px; animation-duration: 2.5s; }
.star:nth-child(4) { top: 60%; left: 20%; font-size: 14px; animation-duration: 5s; animation-delay: 0.5s; }
.star:nth-child(5) { top: 75%; left: 80%; font-size: 18px; animation-duration: 3.5s; animation-delay: 2s; }
.star:nth-child(6) { top: 85%; left: 30%; font-size: 12px; animation-duration: 4.5s; }
@keyframes twinkle { 0%, 100% { opacity: 0.1; transform: scale(0.6); } 50% { opacity: 1; transform: scale(1.3); } }

/* HEADER */
header{ height:60px; display:flex; align-items:center; gap:12px; padding:0 14px; background:var(--hdr); border-bottom:4px solid #111820; position:relative; overflow:hidden; z-index:30; flex:0 0 auto; }
.clouds{position:absolute;inset:0;pointer-events:none;opacity:var(--cloud);overflow:hidden;transition:opacity .4s ease;}
.clouds span{position:absolute;font-size:34px;opacity:.85;animation:drift linear infinite}
.clouds span:nth-child(1){top:4px;animation-duration:46s}
.clouds span:nth-child(2){top:24px;font-size:24px;animation-duration:62s;animation-delay:-12s}
.clouds span:nth-child(3){top:0;font-size:42px;animation-duration:78s;animation-delay:-30s}
@keyframes drift{from{left:-12%}to{left:112%}}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:1.18rem;letter-spacing:.3px;z-index:1;color:#1a1206;text-shadow:0 2px 0 rgba(255,255,255,.35)}
html[data-theme="night"] .brand {color:var(--ink);text-shadow:0 2px 6px rgba(0,0,0,.5)}
.brand .donut{font-size:1.7rem;animation:spin 8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.brand small{font-weight:600;font-size:.62rem;opacity:.8;display:block;line-height:1}
.hdr-spacer{flex:1}
.evt-badges{display:flex;gap:6px;z-index:1}
.evt-badge{font-size:.66rem;font-weight:800;padding:5px 9px;border-radius:20px;background:var(--gold);color:#3a2e00;box-shadow:0 2px 0 var(--goldDeep);animation:pulse 1.4s ease-in-out infinite}
.evt-badge.fest{background:var(--acc2);color:#fff;box-shadow:0 2px 0 rgba(0,0,0,.3)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* LAYOUT */
.shell{display:flex;height:calc(100% - 60px); position:relative; z-index:10;}
aside{flex:0 0 auto;background:var(--pnl);overflow-y:auto;overflow-x:hidden;transition:transform .28s ease,width .26s ease;position:relative}
.left{width:250px;border-right:3px solid var(--acc)}
.right{width:208px;border-left:3px solid var(--acc)}
main{flex:1;overflow-y:auto;position:relative;scroll-behavior:smooth}
.nav-title{font-size:.7rem;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--mut);padding:14px 14px 6px}
.searchbox{padding:10px 12px;position:sticky;top:0;background:var(--pnl);z-index:5;border-bottom:1px solid var(--ln);display:flex;gap:7px;align-items:center}
.searchbox input{flex:1;min-width:0;padding:9px 12px;border-radius:20px;border:2px solid var(--ln);background:var(--pnl2);font-size:.85rem;outline:none}
.aside-full{display:flex;flex-direction:column}
.right .aside-full{padding:12px 10px}
.pin-btn{flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:var(--pnl2);border:2px solid var(--ln);font-size:1rem;display:flex;align-items:center;justify-content:center}
.pin-btn:active{transform:scale(.9)}
.nav-title.tools-row{display:flex;align-items:center;justify-content:space-between;padding-right:4px}

.setlist{padding:6px 8px 30px}
.set-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:12px;cursor:pointer;margin-bottom:3px;transition:background .15s}
.set-item:hover{background:var(--chip)}
.set-item.active{background:var(--chip);box-shadow:inset 3px 0 0 var(--acc)}
.set-emoji{font-size:1.25rem;width:26px;text-align:center;flex:0 0 auto}
.set-meta{flex:1;min-width:0}
.set-name{font-size:.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.set-bar{height:6px;border-radius:6px;background:var(--ln);margin-top:4px;overflow:hidden}
.set-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--gold));border-radius:6px;transition:width .5s cubic-bezier(.2,.9,.3,1)}
.set-pct{font-size:.66rem;font-weight:800;color:var(--mut);flex:0 0 auto}

.tool-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border-radius:14px;margin-bottom:7px;font-weight:700;font-size:.9rem;text-align:left;background:var(--pnl2);border:2px solid transparent;transition:.15s}
.tool-btn:hover{transform:translateX(3px)}
.tool-btn .ti{font-size:1.3rem}
.tool-btn.active{background:var(--acc);color:var(--accInk);border-color:var(--goldDeep);box-shadow:0 4px 0 var(--goldDeep)}

/* MAIN CONTENT */
.page{padding:16px 18px 80px;max-width:1500px;margin:0 auto}
.page-head{display:flex;align-items:center;gap:10px;margin:2px 0 14px}
.page-head h1{font-size:1.5rem;margin:0;font-weight:800}
.page-sub{color:var(--mut);font-size:.85rem;margin:-8px 0 14px}

.filterbar{position:sticky;top:0;z-index:18;background:var(--pnl);border:2px solid var(--ln);border-radius:16px;padding:10px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.filterbar input[type=text]{flex:1;min-width:150px;padding:8px 12px;border-radius:20px;border:2px solid var(--ln);background:var(--pnl2);outline:none}
.filterbar select{padding:8px 10px;border-radius:12px;border:2px solid var(--ln);background:var(--pnl2);font-weight:700;font-size:.82rem;outline:none}
.toggle-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;background:var(--pnl2);border:2px solid var(--ln);font-weight:700;font-size:.82rem;cursor:pointer;}
.toggle-pill input{display:none}
.toggle-pill.on{background:var(--acc);color:var(--accInk);border-color:var(--goldDeep)}

.setblock-head{padding:12px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:linear-gradient(180deg,var(--pnl2),var(--pnl)); border-radius: 18px 18px 0 0;}
.sb-emoji{font-size:1.9rem}
.sb-title{font-weight:800;font-size:1.05rem}
.sb-accchips{display:flex;gap:7px;flex-wrap:wrap;margin-left:auto}
.accchip{display:flex;align-items:center;gap:6px;background:var(--chip);padding:4px 10px;font-size:.74rem;font-weight:800}
.accchip .dot{width:9px;height:9px;border-radius:50%}
.accchip .mini{width:42px;height:6px;border-radius:6px;background:var(--ln);overflow:hidden}
.accchip .mini i{display:block;height:100%;border-radius:6px;transition:width .5s}

.set-scrollwrap{position:relative}
.set-scroll{display:flex;gap:14px;overflow-x:auto;overflow-y:hidden;padding:10px 14px 14px;cursor:grab;scroll-snap-type:x proximity;scroll-behavior:smooth}
.acct-col{flex:0 0 auto;width:clamp(286px,84vw,372px);scroll-snap-align:start;background:var(--pnl2);padding:10px}
.acct-col-head{display:flex;align-items:center;flex-wrap:wrap;gap:7px;padding:3px 3px 9px;border-bottom:2px solid var(--ln);margin-bottom:9px;font-weight:800}
.acct-col-head .dot{width:13px;height:13px;border-radius:50%;flex:0 0 auto}
.acct-col-head .ah-name{font-size:.94rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.acct-col-head .ah-count{margin-left:auto;font-size:.72rem;font-weight:900;background:var(--chip);padding:3px 9px;white-space:nowrap}
.acct-col-head .ah-bar{flex-basis:100%;height:6px;border-radius:6px;background:var(--ln);overflow:hidden;order:9}
.acct-col-head .ah-bar i{display:block;height:100%;border-radius:6px;transition:width .5s}
.sticker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

.scrollbtn{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:var(--acc);color:var(--accInk);font-size:1.05rem;font-weight:900;box-shadow:0 3px 12px rgba(0,0,0,.35);z-index:7;display:none;align-items:center;justify-content:center;}
.setblock.has-overflow .scrollbtn{display:flex}
.scrollbtn.left{left:6px}.scrollbtn.right{right:6px}

.stars{color:var(--gold);font-size:.74rem;letter-spacing:-1px;text-shadow:0 1px 1px var(--goldDeep)}
.card.gold{border-color:var(--gold) !important; background:linear-gradient(180deg,color-mix(in srgb,var(--gold) 18%,var(--pnl2)),var(--pnl2)); box-shadow:0 0 9px color-mix(in srgb,var(--gold) 45%,transparent) !important;}
.card.gold.have{box-shadow:0 0 16px var(--gold),inset 0 0 0 1px var(--gold) !important; animation:goldglow 2.4s ease-in-out infinite}
@keyframes goldglow{0%,100%{box-shadow:0 0 10px var(--gold)}50%{box-shadow:0 0 20px var(--gold)}}
.card.missing{filter:grayscale(1) opacity(.45);background:var(--pnl2)}
.card.missing:hover{filter:grayscale(.4) opacity(.8)}
.card .cic{font-size:1.85rem;line-height:1;display:block;transition:transform .2s}
.card.have .cic{animation:pop .35s ease}
@keyframes pop{0%{transform:scale(.4) rotate(-12deg)}60%{transform:scale(1.18) rotate(6deg)}100%{transform:scale(1)}}
.card .cstars{font-size:.66rem;color:var(--gold);margin-top:2px;}
.card .cname{font-size:.6rem;color:var(--mut);font-weight:700;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.have-badge{position:absolute;top:-7px;right:-7px;width:21px;height:21px;background:var(--good);color:#fff;font-size:.72rem;display:none;align-items:center;justify-content:center;}
.card.have .have-badge{display:flex}
.dupzone{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:7px}
.dupzone button{width:23px;height:23px;background:var(--acc2);color:#fff;font-weight:900;font-size:.95rem;line-height:1;display:flex;align-items:center;justify-content:center;}
.dupzone input{width:34px;text-align:center;background:var(--pnl);font-weight:800;font-size:.78rem;padding:3px 0;outline:none;-moz-appearance:textfield}
.dupzone input::-webkit-outer-spin-button,.dupzone input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

/* Special override for 6-star regular stickers */
.card.star-6 { background: #ffffff !important; border-color: #111820 !important; box-shadow: 3px 4px 0px rgba(0,0,0,0.6), inset 0 0 0 4px #ffffff !important; }

/* Dashboard Cards */
.cards-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
.panel h2{margin:0 0 12px;font-size:1.05rem;display:flex;align-items:center;gap:8px}
.bigbar{height:14px;background:var(--ln);overflow:hidden;margin:6px 0}
.bigbar i{display:block;height:100%;background:linear-gradient(90deg,var(--acc2),var(--acc));transition:width .7s cubic-bezier(.2,.9,.3,1)}
.statrow{display:flex;justify-content:space-between;font-size:.82rem;margin:5px 0;font-weight:600}
.kpi{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.kpi .box{flex:1;min-width:120px;background:var(--pnl);padding:12px 14px;}
.kpi .box .v{font-size:1.7rem;font-weight:900;}
.kpi .box .l{font-size:.72rem;color:var(--mut);font-weight:700;text-transform:uppercase;}

.ring{--p:0;width:96px;height:96px;display:grid;place-items:center; background:conic-gradient(var(--acc) calc(var(--p)*1%),var(--ln) 0);position:relative;}
.ring::before{content:"";position:absolute;inset:9px;background:var(--pnl)}
.ring span{position:relative;font-weight:900;font-size:1.1rem}

.acc-card{display:flex;flex-direction:column;gap:10px}
.acc-top{display:flex;align-items:center;gap:10px}
.avatar{width:46px;height:46px;display:grid;place-items:center;font-size:1.6rem;flex:0 0 auto;}
.field{display:flex;flex-direction:column;gap:3px;font-size:.74rem;font-weight:700;color:var(--mut)}
.field input,.field select{padding:8px 10px;background:var(--pnl2);outline:none;font-weight:600}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.emoji-pick{display:flex;flex-wrap:wrap;gap:4px}
.emoji-pick button{font-size:1.15rem;width:32px;height:32px;background:var(--pnl2);border:2px solid transparent}
.emoji-pick button.sel{border-color:var(--acc);background:var(--chip)}

.tier{display:flex;align-items:center;gap:12px;margin:10px 0}
.tier .tier-ic{font-size:1.7rem;width:42px;text-align:center}
.tier .tier-body{flex:1}
.tier .tier-name{font-weight:800;font-size:.9rem;display:flex;justify-content:space-between}
.dup-list{list-style:none;padding:0;margin:8px 0 0}
.dup-list li{display:flex;align-items:center;gap:9px;padding:7px 9px;background:var(--pnl2);margin-bottom:5px}
.dup-list .rank{font-weight:900;color:var(--mut);width:22px;text-align:center}
.dup-list .dval{margin-left:auto;font-weight:900;color:var(--gold)}

.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;align-items:end}
.trade-list{list-style:none;padding:0;margin:0}
.trade-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--pnl2);margin-bottom:8px;flex-wrap:wrap}
.trade-row.done{opacity:.6}
.trade-row .tdate{font-weight:900;font-size:.74rem;background:var(--chip);padding:4px 8px;white-space:nowrap}
.trade-row .tflow{font-weight:800;font-size:.86rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.trade-row .tstk{color:var(--mut);font-weight:700;font-size:.82rem}
.trade-row .tcheck{margin-left:auto;display:flex;align-items:center;gap:8px}

.cal-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{text-align:center;font-size:.66rem;font-weight:900;color:var(--mut);text-transform:uppercase}
.cal-cell{min-height:62px;background:var(--pnl2);padding:5px;position:relative;cursor:default;transition:.12s}
.cal-cell.has{cursor:pointer;border-color:var(--acc)}
.cal-cell.today{box-shadow:inset 0 0 0 2px var(--acc2)}
.cal-cell .dn{font-weight:800;font-size:.78rem}
.cal-cell .cct{position:absolute;bottom:5px;left:5px;right:5px;display:flex;gap:3px;flex-wrap:wrap}
.cal-cell .pill{font-size:.6rem;font-weight:900;background:var(--acc);color:var(--accInk);padding:1px 6px}

.theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.theme-card{padding:12px;cursor:pointer;border:3px solid transparent;position:relative;overflow:hidden;color:#fff;min-height:84px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow)}
.theme-card.active{border-color:var(--ink);transform:scale(1.03)}
.theme-card .tc-name{font-weight:900;font-size:.9rem;z-index:1;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.theme-card .tc-emoji{font-size:1.6rem;z-index:1}

.setting-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--ln);flex-wrap:wrap}
.setting-row .sr-label{font-weight:800;flex:1;min-width:160px}
.setting-row .sr-label small{display:block;font-weight:600;color:var(--mut);font-size:.74rem}
.setting-row input[type=number]{width:80px;padding:8px;background:var(--pnl2);font-weight:800;text-align:center;outline:none}
.switch{width:52px;height:28px;background:var(--ln);position:relative;cursor:pointer;flex:0 0 auto;transition:.2s}
.switch i{position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch.on{background:var(--good)}
.switch.on i{left:27px}

.empty{text-align:center;padding:50px 20px;color:var(--mut)}
.empty .em{font-size:3.5rem;display:block;margin-bottom:10px;}
.empty h3{color:var(--ink);margin:6px 0}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(3px)}
.modal-bg.show{display:flex;}
.modal{background:var(--pnl);max-width:460px;width:100%;max-height:84vh;overflow-y:auto;border:3px solid var(--acc);box-shadow:0 20px 60px rgba(0,0,0,.5);}
.modal-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:2px solid var(--ln);position:sticky;top:0;background:var(--pnl)}
.modal-head h3{margin:0;flex:1;font-size:1.05rem}
.modal-body{padding:14px 16px}

.confetti{position:fixed;top:-30px;font-size:1.4rem;z-index:200;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.2}}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--bg);padding:11px 20px;font-weight:800;font-size:.85rem;z-index:300;opacity:0;transition:.3s;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* 90s CARTOON OVERRIDES */
.panel, .setblock, .card, .acct-col, .filterbar, .searchbox input, .field input, .field select, .modal, .theme-card, .ring::before { border: 3px solid #111820 !important; border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px !important; box-shadow: 3px 4px 0px rgba(0,0,0,0.6) !important; transition: transform 0.15s ease, box-shadow 0.15s ease; }
.btn, .toggle-pill, .icon-btn, .pin-btn, .scrollbtn, .dupzone button { border: 3px solid #111820 !important; border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px !important; box-shadow: 3px 4px 0px rgba(0,0,0,0.6) !important; }
.card:active, .btn:active, .toggle-pill:active, .icon-btn:active, .pin-btn:active, .scrollbtn:active, .dupzone button:active { transform: translate(2px, 3px) !important; box-shadow: 1px 1px 0px rgba(0,0,0,0.6) !important; }
.have-badge, .ah-count, .pill, .evt-badge, .accchip, .tdate { border: 2px solid #111820 !important; border-radius: 48% 52% 45% 55% / 50% 45% 55% 50% !important; font-weight: 900 !important; box-shadow: 2px 2px 0px rgba(0,0,0,0.5) !important; }
.set-bar, .ah-bar, .bigbar, .mini { border: 2px solid #111820 !important; border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px !important; box-shadow: 2px 2px 0px rgba(0,0,0,0.4) inset !important; }
</style>
</head>
<body>

<div class="night-sky-bg">
  <span class="star">✦</span><span class="star">★</span><span class="star">✦</span>
  <span class="star">★</span><span class="star">✦</span><span class="star">★</span>

let saveTimeout;
function save(){ 
  // 1. Immediate Local Browser Save (Always runs)
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e){} 
  
  // 2. Background Cloud Backup (Debounced)
  if (!isDemoModeActive && activeSessionUser) {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(async () => {
      if (currentCloudSheetId) {
        await supabaseClient.from('tracker_sheets').update({ accounts: state.accounts, inventory: state.inv, trades: state.trades, updated_at: new Date().toISOString() }).eq('id', currentCloudSheetId);

    }, 1000);
  }
}

/* --- Inventory Math --- */
function getCount(acc,sid){ return (state.inv[acc] && state.inv[acc][sid]) || 0; }
function setCount(acc,sid,n){ n = Math.max(0,Math.floor(n||0)); if(!state.inv[acc]) state.inv[acc]={}; if(n===0) delete state.inv[acc][sid]; else state.inv[acc][sid]=n; save(); }
function dupesOf(acc,sid){ return Math.max(0,getCount(acc,sid)-1); }
function ownedInSet(acc,setId){ const set = ALBUM.find(s=>s.id===setId); return set.stickers.reduce((a,s)=>a+(getCount(acc,s.id)>0?1:0),0); }
function ownedTotal(acc){ return STICKERS.reduce((a,s)=>a+(getCount(acc,s.id)>0?1:0),0); }
function ownedGold(acc){ return STICKERS.reduce((a,s)=>a+(s.isGold&&getCount(acc,s.id)>0?1:0),0); }
function starsCollected(acc){ return STICKERS.reduce((a,s)=>a+(getCount(acc,s.id)>0?s.stars:0),0); }
function dupStarValue(s,d){ return d*s.stars*(s.isGold?2:1); }
function vaultTotal(acc){ return STICKERS.reduce((a,s)=>a+dupStarValue(s,dupesOf(acc,s.id)),0); }
function isSetComplete(acc,setId){ const set=ALBUM.find(s=>s.id===setId); return set.stickers.every(s=>getCount(acc,s.id)>0); }

  const { error } = await supabaseClient.auth.signInWithOtp({ email: emailInput, options: { emailRedirectTo: window.location.origin + window.location.pathname } });
  if (error) { feedbackMsg.textContent = "❌ Error: " + error.message; feedbackMsg.style.color = "var(--bad)"; } else { feedbackMsg.textContent = "🍩 Link sent! Check your inbox."; feedbackMsg.style.color = "var(--good)"; }
}
function activateDemoMode() { isDemoModeActive = true; localStorage.setItem("dohnut_demo_active", "true"); document.getElementById("auth-overlay").style.display = "none"; toast("Loaded local offline profile 🎲"); fullRender(); }

async function initializeWebAccount() {
  if (isDemoModeActive || !activeSessionUser) return;
  const { data: webAcc } = await supabaseClient.from('web_accounts').select('web_friend_code').eq('id', activeSessionUser.id).single();
  if (webAcc) myWebFriendCode = webAcc.web_friend_code;
  else { const { data: newAcc } = await supabaseClient.from('web_accounts').insert({ id: activeSessionUser.id }).select('web_friend_code').single(); if (newAcc) myWebFriendCode = newAcc.web_friend_code; }
}

async function fetchFriendsList() {
  if (isDemoModeActive || !activeSessionUser) return;
  const { data: friendships } = await supabaseClient.from('friendships').select(`id, status, user_a, user_b, web_accounts!friendships_user_a_fkey(web_friend_code), web_accounts!friendships_user_b_fkey(web_friend_code)`).or(`user_a.eq.${activeSessionUser.id},user_b.eq.${activeSessionUser.id}`);
  const container = document.getElementById('friends-list'); if (!container) return; container.innerHTML = '';
  if (!friendships || friendships.length === 0) { container.innerHTML = '<div style="color:var(--mut); font-weight:700; padding:10px;">Your Rolodex is empty!</div>'; return; }
  friendships.forEach(f => {
    const isIncoming = f.user_b === activeSessionUser.id && f.status === 'pending';
    const friendCode = f.user_a === activeSessionUser.id ? f.web_accounts_user_b_fkey.web_friend_code : f.web_accounts_user_a_fkey.web_friend_code;
    const li = document.createElement('li'); li.className = 'trade-row';
    if (f.status === 'pending') {
      if (isIncoming) li.innerHTML = `<span class="avatar" style="width:30px; height:30px; font-size:1rem; background:#e8a13a;">🍩</span><span style="font-weight:800; font-size:0.9rem; flex:1;">Player (${friendCode})</span><span class="auto-tag" style="background:var(--acc); color:var(--accInk);">Incoming</span><button class="btn sm" onclick="updateFriendStatus('${f.id}', 'accepted')" style="margin-left:6px;">Accept</button><button class="btn sm danger" onclick="updateFriendStatus('${f.id}', 'blocked')">✕</button>`;
      else li.innerHTML = `<span class="avatar" style="width:30px; height:30px; font-size:1rem; background:#5d7689;">☁️</span><span style="font-weight:800; font-size:0.9rem; flex:1;">Sent to (${friendCode})</span><span class="auto-tag" style="background:var(--goldDeep);">Sent</span>`;
    } else if (f.status === 'accepted') {
      li.innerHTML = `<span class="avatar" style="width:30px; height:30px; font-size:1rem; background:#54bf3a;">🛹</span><span style="font-weight:800; font-size:0.9rem; flex:1;">Friend (${friendCode})</span><span style="font-size:0.75rem; font-weight:900; color:var(--mut);">Connected</span><button class="btn sm ghost" style="margin-left:8px;">View Album</button>`;
    }
    container.appendChild(li);
  });
}

async function sendFriendRequest() {
  const targetCode = document.getElementById('add-friend-input').value.trim();
  if (!targetCode) return toast("Enter a Web Code first! ⚠️"); if (targetCode === myWebFriendCode) return toast("You can't add yourself! 🍩");
  const { data: targetUser } = await supabaseClient.from('web_accounts').select('id').eq('web_friend_code', targetCode).single();
  if (!targetUser) return toast("No player found. 🕵️‍♂️");
  const { error: insertErr } = await supabaseClient.from('friendships').insert({ user_a: activeSessionUser.id, user_b: targetUser.id, status: 'pending' });
  if (insertErr) toast("Request already exists! ⏳"); else { toast("Friend request sent! 📨"); document.getElementById('add-friend-input').value = ""; fetchFriendsList(); }
}

async function updateFriendStatus(friendshipId, newStatus) {
  const { error } = await supabaseClient.from('friendships').update({ status: newStatus }).eq('id', friendshipId);
  if (!error) { toast(newStatus === 'accepted' ? "Friend request accepted! 🎉" : "Request updated."); fetchFriendsList(); } else toast("Action failed. ❌");
}

async function handleSession(session) {
  if (!session) return; activeSessionUser = session.user; document.getElementById("auth-overlay").style.display = "none"; toast("Connected to Cloud ☁️");
  await initializeWebAccount();
  const { data } = await supabaseClient.from('tracker_sheets').select('*').eq('user_id', activeSessionUser.id).single();
  if (data) {
    currentCloudSheetId = data.id;
    // Overwrite local state with cloud state ONLY if cloud state has data
    if(data.accounts && data.accounts.length > 0) state.accounts = data.accounts;
    if(data.inventory && Object.keys(data.inventory).length > 0) state.inv = data.inventory;
    if(data.trades && data.trades.length > 0) state.trades = data.trades;
  } else {
    const { data: newSheet } = await supabaseClient.from('tracker_sheets').insert({ user_id: activeSessionUser.id, accounts: state.accounts, inventory: state.inv, trades: state.trades }).select().single();
    if(newSheet) currentCloudSheetId = newSheet.id;
  }
  save(); // Force an immediate local re-save of the synced data
  fullRender(); fetchFriendsList();
}

/* --- THE ALBUM --- */
function matchesGlobal(s){
  if(filters.star!=="all" && s.stars!==+filters.star) return false;
  if(filters.gold==="gold" && !s.isGold) return false;
  if(filters.gold==="reg" && s.isGold) return false;
  if(filters.q){ const q=filters.q.toLowerCase(); if(!s.name.toLowerCase().includes(q) && !s.setName.toLowerCase().includes(q)) return false; }
  return true;
}
function matchesForAccount(s,accId){
  if(!matchesGlobal(s)) return false;
  if(filters.need && getCount(accId,s.id)>0) return false;   
  if(filters.dupes && dupesOf(accId,s.id)===0) return false;  
  return true;
}
function filterBarHtml(){
  const starOpts=["all",1,2,3,4,5,6].map(v=>`<option value="${v}" ${filters.star==(v+"")?"selected":""}>${v==="all"?"All stars":"★ "+v}</option>`).join("");
  return `<div class="filterbar"><input type="text" data-filter="q" value="${esc(filters.q)}" placeholder="🔎 Search stickers…"><label class="toggle-pill ${filters.need?"on":""}" data-action="filter-toggle" data-f="need">🎯 Need Only</label><label class="toggle-pill ${filters.dupes?"on":""}" data-action="filter-toggle" data-f="dupes">🃏 Dupes Only</label><select data-filter="star">${starOpts}</select><select data-filter="gold"><option value="all" ${filters.gold==="all"?"selected":""}>Gold & Regular</option><option value="gold" ${filters.gold==="gold"?"selected":""}>✨ Gold only</option><option value="reg" ${filters.gold==="reg"?"selected":""}>Regular only</option></select><button class="btn ghost sm" data-action="clear-filters">Reset</button></div>`;
}

function viewAlbum(){
  let head=`<div class="page-head"><span class="ph-emoji">📖</span><h1>The Album</h1></div>`;
  if(state.accounts.length===0) return head+filterBarHtml()+`<div class="empty"><span class="em">👨‍👩‍👧‍👦</span><h3>No accounts yet!</h3><p>Add at least one account to start tracking stickers.</p><button class="btn" data-action="goto-page" data-page="accounts">➕ Add an Account</button></div>`;
  let blocks="";
  ALBUM.forEach(set=>{
    const perAcc = state.accounts.map(a=>({a, list:set.stickers.filter(s=>matchesForAccount(s,a.id))}));
    if(perAcc.some(p=>p.list.length>0)) blocks += setBlockHtml(set,perAcc);
  });
  if(!blocks) blocks=`<div class="empty"><span class="em">🔍</span><h3>Nothing matches those filters</h3><button class="btn ghost" data-action="clear-filters">Clear filters</button></div>`;
  
  // Bonus Sets Display
  blocks += `<div style="margin-top:40px; border-top:4px dashed var(--ink); padding-top:20px;"><div class="page-head"><span class="ph-emoji">🎁</span><h1>Bonus Episode Sets</h1></div></div>`;
  if(state.bonusSets.length === 0) blocks += `<div class="empty"><p>No active bonus episodes.</p></div>`;
  state.bonusSets.forEach(bSet => {
     blocks += `<div class="setblock" style="background:var(--pnl2); border-style:dashed;">
       <div class="setblock-head"><span class="sb-title">Bonus: ${esc(bSet.name)}</span><span style="margin-left:auto; color:var(--bad); font-weight:800;">Ends: ${esc(bSet.endDate)}</span></div>
       <div class="panel-empty">Admin has not added stickers to this bonus set yet.</div></div>`;
  });

  return head+filterBarHtml()+blocks;
}

function setBlockHtml(set,perAcc){
  let chips="", allDone=true;
  state.accounts.forEach(a=>{
    const o=ownedInSet(a.id,set.id), pct=Math.round(o/set.stickers.length*100); if(pct<100) allDone=false;
    chips+=`<span class="accchip"><span class="dot" style="background:${a.color}"></span>${a.emoji} ${esc(a.name)} ${o}/${set.stickers.length}<span class="mini"><i style="width:${pct}%;background:${a.color}"></i></span></span>`;
  });
  let cols="";
  perAcc.forEach(({a,list})=>{
    const o=ownedInSet(a.id,set.id), pct=Math.round(o/set.stickers.length*100);
    const grid = list.length ? list.map(s=>cardHtml(a,s)).join("") : `<div class="panel-empty">✨ Nothing to show here</div>`;
    cols+=`<div class="acct-col"><div class="acct-col-head"><span class="dot" style="background:${a.color}"></span><span class="ah-name">${a.emoji} ${esc(a.name)}</span><span class="ah-count" data-acc="${a.id}">${o}/${set.stickers.length}</span><span class="ah-bar"><i data-acc="${a.id}" style="width:${pct}%;background:${a.color}"></i></span></div><div class="sticker-grid">${grid}</div></div>`;
  });
  return `<div class="setblock ${allDone?"complete":""}" id="set-${set.id}" data-setblock="${set.id}"><div class="setblock-head"><span class="sb-emoji">${SET_EMOJI[set.id]||"🎴"}</span><span class="sb-title"><span class="num">Set ${set.id}</span>${esc(set.name)}</span><span class="scroll-hint">↔ drag / swipe</span><span class="sb-accchips">${chips}</span></div><div class="set-scrollwrap"><button class="scrollbtn left" data-action="scroll-set" data-dir="-1">◀</button><div class="set-scroll">${cols}</div><button class="scrollbtn right" data-action="scroll-set" data-dir="1">▶</button></div></div>`;
}

function cardHtml(a,s){
  const c=getCount(a.id,s.id), have=c>0, d=Math.max(0,c-1), starClass = s.stars === 6 ? "star-6" : ""; 
  return `<div class="card ${have?"have":"missing"} ${s.isGold?"gold":""} ${starClass}" data-action="sticker" data-acc="${a.id}" data-sid="${s.id}" title="${esc(s.name)} — ${esc(a.name)}"><span class="have-badge">✓</span><span class="cic">${iconFor(s)}</span><span class="cstars">${starStr(s.stars)}</span><span class="cname">${esc(s.name)}</span><div class="dupzone" data-action="dupzone"><button data-action="dup-dec" data-acc="${a.id}" data-sid="${s.id}">−</button><input class="dupinput ${d>0?"has":""}" type="number" min="0" value="${d}" data-acc="${a.id}" data-sid="${s.id}"><button data-action="dup-inc" data-acc="${a.id}" data-sid="${s.id}">+</button></div></div>`;
}

function viewVault(){
  let head=`<div class="page-head"><span class="ph-emoji">⭐</span><h1>Star Vault</h1></div>`;
  if(state.accounts.length===0) return head+`<div class="empty"><h3>No accounts yet</h3></div>`;
  let panels=state.accounts.map(a=>{
    const total=vaultTotal(a.id);
    let tiers=VAULT_TIERS.map(t=>{ const pct=Math.min(100,Math.round(total/t.need*100)), maxed=total>=t.need; return `<div class="tier ${maxed?"maxed":""}"><span class="tier-ic">${maxed?"🏆":t.emoji}</span><div class="tier-body"><div class="tier-name"><span>${t.name}</span><span>${Math.min(total,t.need)} / ${t.need} ${maxed?"✅":""}</span></div><div class="bigbar"><i style="width:${pct}%;background:linear-gradient(90deg,${t.color},color-mix(in srgb,${t.color} 55%,#fff))"></i></div></div></div>`; }).join("");
    let dups=STICKERS.map(s=>({s,d:dupesOf(a.id,s.id)})).filter(x=>x.d>0).map(x=>({...x,val:dupStarValue(x.s,x.d)})).sort((p,q)=>q.val-p.val).slice(0,10);
    let list = dups.length? dups.map((x,i)=>`<li><span class="rank">${i+1}</span><span style="font-size:1.2rem">${iconFor(x.s)}</span><span class="nm">${esc(x.s.name)} ${x.s.isGold?'<span class="goldtag">G</span>':""}<br><small style="color:var(--mut);font-weight:600">×${x.d} · ${x.s.stars}⭐${x.s.isGold?" ·2x":""}</small></span><span class="dval">+${x.val}</span></li>`).join("") : `<li style="color:var(--mut)">No duplicates yet.</li>`;
    return `<div class="panel vault-acc"><h2><span class="avatar" style="width:34px;height:34px;font-size:1.2rem;background:${a.color}">${a.emoji}</span> ${esc(a.name)}<span style="margin-left:auto;font-size:1.4rem;color:var(--gold)">⭐ ${total}</span></h2>${tiers}<div class="nav-title" style="padding:12px 0 4px">Top 10 Duplicates</div><ul class="dup-list">${list}</ul></div>`;
  }).join("");
  return head+`<div class="cards-grid">${panels}</div>`;
}

    <h2>🎁 Admin: Create Bonus Set</h2>
    <div class="form-grid">
      <div class="field"><span>Bonus Set Name</span><input type="text" id="b-name" style="border:3px solid #111820; border-radius:12px;"></div>
      <div class="field"><span>End Date</span><input type="date" id="b-end" style="border:3px solid #111820; border-radius:12px;"></div>
      <button class="btn" onclick="createBonusSet()">Create Set</button>
    </div>
  </div>`;

  const localPlanner = `
    <div class="panel"><h2>✍️ Manual Local Trade</h2>
      <div class="form-grid">
        <div class="field"><span>Sender</span><select id="t-from">${state.accounts.map(a=>`<option value="${a.id}">${a.name}</option>`).join("")}</select></div>
        <div class="field"><span>Receiver</span><select id="t-to">${state.accounts.map(a=>`<option value="${a.id}">${a.name}</option>`).join("")}</select></div>
        <div class="field"><span>Set</span><select id="t-set" data-action="trade-set">${ALBUM.map(s=>`<option value="${s.id}">${s.name}</option>`).join("")}</select></div>
        <div class="field"><span>Sticker</span><select id="t-stk"></select></div>
        <div class="field"><span>Date</span><input type="date" id="t-date" value="${todayStr()}"></div>
        <button class="btn" data-action="add-trade">➕ Add</button>
      </div>
    </div>
    <div class="panel"><h2>🧠 Smart Planner</h2><button class="btn" data-action="gen-plan">⚡ Generate Plan</button>
      ${plan.length?`<button class="btn alt" data-action="apply-plan">✅ Add ${plan.length} to Schedule</button><button class="btn ghost" data-action="discard-plan">Discard</button>`:""}
      <div id="planPreview" style="margin-top:12px">${planPreviewHtml()}</div>
    </div>
    <div class="panel"><h2>📋 Scheduled Local Trades</h2><ul class="trade-list">${[...state.trades].sort((a,b)=>a.date<b.date?-1:1).map(t=>tradeRowHtml(t)).join("")||"<li>No trades scheduled</li>"}</ul></div>`;

  // Router
  let activeContent = '';
  if (activeCommunityTab === 'network') { activeContent = friendRolodex; setTimeout(fetchFriendsList, 50); }
  else if (activeCommunityTab === 'search') activeContent = communityHub;
  else if (activeCommunityTab === 'events') activeContent = eventPartner;
  else if (activeCommunityTab === 'local') activeContent = localPlanner;
  else if (activeCommunityTab === 'bonus') activeContent = bonusAdmin;

  return head + portalTabs + activeContent;
}

function viewSettings(){
  return `<div class="page-head"><span class="ph-emoji">⚙️</span><h1>Settings</h1></div>
    <div class="panel"><h2>🎨 Theme</h2><div class="theme-grid">${THEMES.map(t=>`<div class="theme-card ${state.settings.theme===t.id?"active":""}" data-action="set-theme" data-theme="${t.id}" style="background:linear-gradient(135deg,${t.c[0]},${t.c[0]} 50%,${t.c[2]})"><div style="display:flex;justify-content:space-between"><span class="tc-name">${t.name}</span><span class="tc-emoji">${t.emoji}</span></div></div>`).join("")}</div></div>
    <div class="panel"><h2>💾 Cloud & Data</h2><div style="display:flex;gap:10px;"><button class="btn alt" data-action="export-data">⬇️ Export JSON Backup</button><button class="btn danger" data-action="sign-out">🚪 Sign Out</button></div></div>`;
}

/* --- TRADE PLANNERS & BONUS ADMIN --- */
function createBonusSet(){
  const name = document.getElementById('b-name').value; const endDate = document.getElementById('b-end').value;
  if(!name || !endDate) return toast("Fill all fields");
  state.bonusSets.push({ id: uid(), name, endDate, stickers: [] });
  save(); renderContent(); toast("Bonus Set Created!");
}

function tradeRowHtml(t){
  const f=accById(t.from),to=accById(t.to),s=SBYID[t.sid]; if(!f||!to||!s) return "";
  return `<li class="trade-row ${t.done?"done":""}"><span class="tdate">${prettyDate(t.date)}</span><span class="tflow"><span style="color:${f.color}">${f.emoji} ${esc(f.name)}</span><span class="arrow">→</span><span style="color:${to.color}">${to.emoji} ${esc(to.name)}</span></span><span class="tstk">${iconFor(s)} ${esc(s.name)} ${starStr(s.stars)}</span><span class="tcheck"><label style="display:flex;align-items:center;gap:6px;font-weight:800;font-size:.78rem"><input type="checkbox" class="big" ${t.done?"checked":""} data-action="trade-toggle" data-id="${t.id}"> Done</label><button class="btn danger sm" data-action="del-trade" data-id="${t.id}">✕</button></span></li>`;
}
function planPreviewHtml(){ return plan.length ? plan.map(t=>{ const f=accById(t.from),to=accById(t.to),s=SBYID[t.sid]; return `<div class="trade-row"><span class="tflow">${f.emoji}→${to.emoji}</span><span class="tstk">${s.name}</span></div>`; }).join("") : "No plan yet."; }
function afterTrades(){ const setSel=document.getElementById("t-set"); if(setSel) populateStickerSelect(setSel.value); }
function populateStickerSelect(setId){ const stk=document.getElementById("t-stk"); if(!stk) return; const set=ALBUM.find(s=>s.id==setId)||ALBUM[0]; stk.innerHTML=set.stickers.map(s=>`<option value="${s.id}">${esc(s.name)} (${starStr(s.stars)})</option>`).join(""); }

function generatePlan(){
  if(state.accounts.length<2) return toast("Need 2+ accounts");
  const HORIZON=14, regLimit = state.settings.regularLimit, work={};
  state.accounts.forEach(a=>{ work[a.id]={}; STICKERS.forEach(s=>work[a.id][s.id]=getCount(a.id,s.id)); });
  const give=(acc,sid)=>Math.max(0,work[acc][sid]-1), need=(acc,sid)=>work[acc][sid]===0;
  let cands=[]; STICKERS.forEach(s=>{ if(s.isGold) return; state.accounts.filter(a=>give(a.id,s.id)>0).forEach(g=>state.accounts.filter(a=>need(a.id,s.id)).forEach(t=>{ if(g.id!==t.id) cands.push({s,from:g.id,to:t.id,score:s.stars}); })); });
  cands.sort((a,b)=>b.score-a.score);
  const sends={}; state.accounts.forEach(a=>sends[a.id]=Array.from({length:HORIZON},()=>0));
  const planned=new Set(), base=new Date(); base.setHours(0,0,0,0); const out=[];
  for(const c of cands){
    const key=c.to+"|"+c.s.id; if(planned.has(key) || give(c.from,c.s.id)<=0) continue;
    let day=-1; for(let d=0;d<HORIZON;d++){ if(sends[c.from][d]<regLimit){ day=d; break; } }
    if(day<0) continue; sends[c.from][day]++; work[c.from][c.s.id]--; work[c.to][c.s.id]++; planned.add(key);
    const dt=new Date(base); dt.setDate(dt.getDate()+day); out.push({id:uid(),from:c.from,to:c.to,setId:c.s.setId,sid:c.s.id,date:fmtDate(dt),done:false,auto:true});
  }
  plan=out; toast(`Planned ${out.length} trades 🧠`); renderContent();
}
function applyPlan(){ plan.forEach(t=>state.trades.push(t)); plan=[]; save(); toast(`Added trades ✅`); renderContent(); }

/* ============================================================
   6. DELEGATION & LISTENERS
   ============================================================ */
function updateCell(acc,sid){ const cell=document.querySelector(`.card[data-acc="${acc}"][data-sid="${sid}"]`); if(!cell) return; const c=getCount(acc,sid), have=c>0, d=Math.max(0,c-1); cell.classList.toggle("have",have); cell.classList.toggle("missing",!have); const inp=cell.querySelector(".dupinput"); if(inp){ inp.value=d; inp.classList.toggle("has",d>0); } }

document.addEventListener("click",e=>{
  const el=e.target.closest("[data-action]"); if(!el) return; const a=el.dataset.action;
  switch(a){
    case "goto-page": gotoPage(el.dataset.page); break;
    case "set-theme": applyTheme(el.dataset.theme); break;
    case "sticker": const c=getCount(el.dataset.acc,el.dataset.sid); setCount(el.dataset.acc,el.dataset.sid,c>0?0:1); updateCell(el.dataset.acc,el.dataset.sid); renderSetList(); break;
    case "dup-inc": setCount(el.dataset.acc,el.dataset.sid,getCount(el.dataset.acc,el.dataset.sid)+1); updateCell(el.dataset.acc,el.dataset.sid); renderSetList(); break;
    case "dup-dec": setCount(el.dataset.acc,el.dataset.sid,getCount(el.dataset.acc,el.dataset.sid)-1); updateCell(el.dataset.acc,el.dataset.sid); renderSetList(); break;
    case "add-account": state.accounts.push({id:uid(),name:"Player "+(state.accounts.length+1),color:"#5b8f3a",emoji:"🍩"}); save(); renderContent(); break;
    case "del-account": state.accounts=state.accounts.filter(x=>x.id!==el.dataset.id); save(); renderContent(); break;
    case "acc-emoji": const ac=accById(el.dataset.id); if(ac){ ac.emoji=el.dataset.e; save(); renderContent(); } break;
    case "add-trade": 
      const from=document.getElementById("t-from").value, to=document.getElementById("t-to").value, sid=document.getElementById("t-stk").value, setId=+document.getElementById("t-set").value;
      if(from===to || !sid) return toast("Invalid trade");
      state.trades.push({id:uid(),from,to,setId,sid,date:document.getElementById("t-date").value||todayStr(),done:false}); save(); renderContent(); toast("Trade scheduled"); break;
    case "del-trade": state.trades=state.trades.filter(x=>x.id!==el.dataset.id); save(); renderContent(); break;
    case "gen-plan": generatePlan(); break; case "apply-plan": applyPlan(); break; case "discard-plan": plan=[]; renderContent(); break;
    case "sign-out": if(confirm("Log out?")) { supabaseClient.auth.signOut(); isDemoModeActive=false; localStorage.removeItem("dohnut_demo_active"); } break;
  }
});

document.addEventListener("change",e=>{
  const t=e.target; 
  if(t.classList.contains("dupinput")){ setCount(t.dataset.acc,t.dataset.sid, parseInt(t.value)||0); updateCell(t.dataset.acc,t.dataset.sid); renderSetList(); return; }
  const a=t.dataset.action; if(a==="trade-set") populateStickerSelect(t.value);
  else if(a==="trade-toggle"){ const tr=state.trades.find(x=>x.id===t.dataset.id); if(tr){ tr.done=t.checked; save(); renderContent(); } }
  else if(a==="acc-name"){ const ac=accById(t.dataset.id); if(ac){ ac.name=t.value||"Player"; save(); renderContent(); } }
  else if(a==="acc-color"){ const ac=accById(t.dataset.id); if(ac){ ac.color=t.value; save(); renderContent(); } }
});

/* ============================================================
   7. BOOT
   ============================================================ */
function fullRender(){
  document.querySelectorAll(".tool-btn").forEach(b=>b.classList.toggle("active",b.dataset.page===state.page));
  renderBadges(); renderSetList(); renderContent();
}
document.addEventListener("DOMContentLoaded", async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) handleSession(session);
  else if (isDemoModeActive) { document.getElementById("auth-overlay").style.display = "none"; fullRender(); }
  else document.getElementById("auth-overlay").style.display = "flex";

  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN') handleSession(session);
    if (event === 'SIGNED_OUT') { activeSessionUser=null; document.getElementById("auth-overlay").style.display="flex"; state=freshState(); fullRender(); }
  });
  applyTheme(state.settings.theme||"springfield");
});
</script>
</body>
</html>
