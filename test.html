<!DOCTYPE html>
<html lang="en" data-theme="springfield">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#ffd521">
<title>D'oh-nut Album — The Simpsons Sticker Tracker</title>
<!-- SUPABASE CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   THEME ENGINE — Day & Night Springfield Themes
   ============================================================ */
:root{
  --rail: 196px; --col-min: 154px;
  --radius: 16px; --radius-sm: 10px;
  --font: "Comic Sans MS", "Chalkboard SE", "Marker Felt", system-ui, sans-serif;
  
  /* Springfield (Day) Defaults */
  --sky:#7ec0ee; --bg:#dff1ff; --pnl:#ffffff; --pnl2:#f1f8ff;
  --ink:#16242f; --mut:#5d7689; --ln:#cfe4f4;
  --acc:#ffd521; --accInk:#3a2e00; --acc2:#3f9bd6;
  --gold:#ffcf33; --goldDeep:#d99a00; --good:#54bf3a; --bad:#e8533a;
  --hdr: linear-gradient(180deg,#79c0ff 0%,#bfe3ff 100%);
  --chip:#eef6ff; --shadow: 0 6px 18px rgba(20,60,90,.16);
  --cloud:1;
}

html[data-theme="night"]{
  /* Springfield (Night) Overrides */
  --sky:#1e293b; --bg:#0f172a; --pnl:#1e293b; --pnl2:#334155;
  --ink:#f8fafc; --mut:#cbd5e1; --ln:#475569;
  --acc:#ffd521; --accInk:#3a2e00; --acc2:#3f9bd6;
  --gold:#ffcf33; --goldDeep:#d99a00; --good:#54bf3a; --bad:#e8533a;
  --hdr: linear-gradient(180deg,#1e293b 0%,#0f172a 100%);
  --chip:#475569; --shadow: 0 6px 18px rgba(0,0,0,.6);
  --cloud:0; /* Hide clouds at night */
}

/* ============================================================
   BASE
   ============================================================ */
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:var(--font); background:var(--bg); color:var(--ink);
  -webkit-font-smoothing:antialiased; overflow:hidden;
  transition:background .4s ease,color .4s ease;
}
button,input,select{font-family:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
::-webkit-scrollbar{height:11px;width:11px}
::-webkit-scrollbar-thumb{background:var(--acc2);border-radius:20px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-track{background:transparent}
.hidden{display:none !important}

/* ============================================================
   NIGHT SKY (CSS ONLY STAR FIELD)
   ============================================================ */
.night-sky-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  opacity: 0; transition: opacity 0.6s ease; overflow: hidden;
}
html[data-theme="night"] .night-sky-bg { opacity: 1; }
.night-sky-bg .star {
  position: absolute; color: #FFF; font-size: 12px;
  animation: twinkle linear infinite;
  text-shadow: 0 0 4px #FFF, 0 0 10px var(--gold);
}
.star:nth-child(1) { top: 10%; left: 15%; font-size: 16px; animation-duration: 3s; }
.star:nth-child(2) { top: 25%; left: 85%; font-size: 10px; animation-duration: 4s; animation-delay: 1s; }
.star:nth-child(3) { top: 40%; left: 50%; font-size: 20px; animation-duration: 2.5s; }
.star:nth-child(4) { top: 60%; left: 20%; font-size: 14px; animation-duration: 5s; animation-delay: 0.5s; }
.star:nth-child(5) { top: 75%; left: 80%; font-size: 18px; animation-duration: 3.5s; animation-delay: 2s; }
.star:nth-child(6) { top: 85%; left: 30%; font-size: 12px; animation-duration: 4.5s; }
.star:nth-child(7) { top: 5%; left: 60%; font-size: 15px; animation-duration: 3.2s; animation-delay: 1.5s; }
.star:nth-child(8) { top: 50%; left: 90%; font-size: 11px; animation-duration: 4.1s; animation-delay: 0.8s; }
.star:nth-child(9) { top: 90%; left: 60%; font-size: 17px; animation-duration: 3.8s; animation-delay: 2.5s; }

@keyframes twinkle {
  0%, 100% { opacity: 0.1; transform: scale(0.6); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* ============================================================
   HEADER
   ============================================================ */
header{
  height:60px; display:flex; align-items:center; gap:12px; padding:0 14px;
  background:var(--hdr); border-bottom:4px solid var(--acc);
  position:relative; overflow:hidden; z-index:30; flex:0 0 auto;
}
.clouds{position:absolute;inset:0;pointer-events:none;opacity:var(--cloud);overflow:hidden;transition:opacity .4s ease;}
.clouds span{position:absolute;font-size:34px;opacity:.85;animation:drift linear infinite}
.clouds span:nth-child(1){top:4px;animation-duration:46s}
.clouds span:nth-child(2){top:24px;font-size:24px;animation-duration:62s;animation-delay:-12s}
.clouds span:nth-child(3){top:0;font-size:42px;animation-duration:78s;animation-delay:-30s}
@keyframes drift{from{left:-12%}to{left:112%}}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:1.18rem;letter-spacing:.3px;z-index:1;color:#1a1206;text-shadow:0 2px 0 rgba(255,255,255,.35)}

html[data-theme="night"] .brand {color:var(--ink);text-shadow:0 2px 6px rgba(0,0,0,.5)}

.brand .donut{font-size:1.7rem;animation:spin 8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.brand small{font-weight:600;font-size:.62rem;opacity:.8;display:block;line-height:1}
.hdr-spacer{flex:1}
.evt-badges{display:flex;gap:6px;z-index:1}
.evt-badge{font-size:.66rem;font-weight:800;padding:5px 9px;border-radius:20px;background:var(--gold);color:#3a2e00;box-shadow:0 2px 0 var(--goldDeep);animation:pulse 1.4s ease-in-out infinite}
.evt-badge.fest{background:var(--acc2);color:#fff;box-shadow:0 2px 0 rgba(0,0,0,.3)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.icon-btn{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.25);font-size:1.25rem;display:none;align-items:center;justify-content:center;z-index:1;border:2px solid rgba(255,255,255,.35)}
.icon-btn:active{transform:scale(.92)}

/* ============================================================
   LAYOUT
   ============================================================ */
.shell{display:flex;height:calc(100% - 60px); position:relative; z-index:10;}
aside{flex:0 0 auto;background:var(--pnl);overflow-y:auto;overflow-x:hidden;transition:transform .28s ease,width .26s ease;position:relative}
.left{width:250px;border-right:3px solid var(--acc)}
.right{width:208px;border-left:3px solid var(--acc)}
main{flex:1;overflow-y:auto;position:relative;scroll-behavior:smooth}

.nav-title{font-size:.7rem;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--mut);padding:14px 14px 6px}
.searchbox{padding:10px 12px;position:sticky;top:0;background:var(--pnl);z-index:5;border-bottom:1px solid var(--ln);display:flex;gap:7px;align-items:center}
.searchbox input{flex:1;min-width:0;padding:9px 12px;border-radius:20px;border:2px solid var(--ln);background:var(--pnl2);font-size:.85rem;outline:none}
.aside-full{display:flex;flex-direction:column}
.right .aside-full{padding:12px 10px}
.pin-btn{flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:var(--pnl2);border:2px solid var(--ln);font-size:1rem;display:flex;align-items:center;justify-content:center}
.pin-btn:active{transform:scale(.9)}
.nav-title.tools-row{display:flex;align-items:center;justify-content:space-between;padding-right:4px}
.rail-tab{display:none;position:absolute;top:0;bottom:0;width:46px;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;z-index:2;background:linear-gradient(180deg,var(--pnl),var(--pnl2));transition:opacity .2s}
.rail-tab .rt-ic{font-size:1.5rem}
.rail-tab .rt-tx{writing-mode:vertical-rl;text-orientation:upright;letter-spacing:2px;font-size:.62rem;font-weight:900;color:var(--mut)}
.left .rail-tab{left:0;border-right:3px solid var(--acc)}
.right .rail-tab{right:0;border-left:3px solid var(--acc)}
.searchbox input:focus{border-color:var(--acc)}

/* Left set list */
.setlist{padding:6px 8px 30px}
.set-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:12px;cursor:pointer;margin-bottom:3px;transition:background .15s}
.set-item:hover{background:var(--chip)}
.set-item.active{background:var(--chip);box-shadow:inset 3px 0 0 var(--acc)}
.set-emoji{font-size:1.25rem;width:26px;text-align:center;flex:0 0 auto}
.set-meta{flex:1;min-width:0}
.set-meta .set-name{font-size:.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.set-bar{height:6px;border-radius:6px;background:var(--ln);margin-top:4px;overflow:hidden}
.set-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--gold));border-radius:6px;transition:width .5s cubic-bezier(.2,.9,.3,1)}
.set-pct{font-size:.66rem;font-weight:800;color:var(--mut);flex:0 0 auto}
.set-item.done .set-emoji{animation:bob 1.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

/* Right tool nav */
.tool-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border-radius:14px;margin-bottom:7px;font-weight:700;font-size:.9rem;text-align:left;background:var(--pnl2);border:2px solid transparent;transition:.15s}
.tool-btn:hover{transform:translateX(3px)}
.tool-btn .ti{font-size:1.3rem}
.tool-btn.active{background:var(--acc);color:var(--accInk);border-color:var(--goldDeep);box-shadow:0 4px 0 var(--goldDeep)}
.tool-sep{height:1px;background:var(--ln);margin:10px 4px}
.theme-mini{margin-top:8px}
.theme-mini .nav-title{padding:6px 4px}
.swatch-row{display:flex;flex-wrap:wrap;gap:6px;padding:0 2px}
.swatch{width:30px;height:30px;border-radius:9px;border:2px solid var(--ln);cursor:pointer;position:relative;overflow:hidden}
.swatch.active{border-color:var(--ink);transform:scale(1.12)}
.swatch:active{transform:scale(.9)}

/* ============================================================
   MAIN CONTENT
   ============================================================ */
.page{padding:16px 18px 80px;max-width:1500px;margin:0 auto}
.page-head{display:flex;align-items:center;gap:10px;margin:2px 0 14px}
.page-head h1{font-size:1.5rem;margin:0;font-weight:800}
.page-head .ph-emoji{font-size:1.8rem;animation:bob 2.6s ease-in-out infinite}
.page-sub{color:var(--mut);font-size:.85rem;margin:-8px 0 14px}

/* Sticky album filters */
.filterbar{position:sticky;top:0;z-index:18;background:var(--pnl);border:2px solid var(--ln);border-radius:16px;padding:10px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;box-shadow:var(--shadow)}
.filterbar input[type=text]{flex:1;min-width:150px;padding:8px 12px;border-radius:20px;border:2px solid var(--ln);background:var(--pnl2);outline:none}
.filterbar input[type=text]:focus{border-color:var(--acc)}
.filterbar select{padding:8px 10px;border-radius:12px;border:2px solid var(--ln);background:var(--pnl2);font-weight:700;font-size:.82rem;outline:none}
.toggle-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;background:var(--pnl2);border:2px solid var(--ln);font-weight:700;font-size:.82rem;cursor:pointer;user-select:none}
.toggle-pill input{display:none}
.toggle-pill.on{background:var(--acc);color:var(--accInk);border-color:var(--goldDeep)}
.btn{padding:9px 15px;border-radius:14px;font-weight:800;font-size:.85rem;background:var(--acc);color:var(--accInk);box-shadow:0 4px 0 var(--goldDeep);transition:.1s}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--goldDeep)}
.btn.alt{background:var(--acc2);color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.28)}
.btn.ghost{background:var(--pnl2);color:var(--ink);box-shadow:none;border:2px solid var(--ln)}
.btn.danger{background:var(--bad);color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.25)}
.btn.sm{padding:6px 11px;font-size:.78rem;box-shadow:none}

/* ----- Album set blocks ----- */
.setblock{background:var(--pnl);border:2px solid var(--ln);border-radius:18px;margin-bottom:20px;overflow:hidden;box-shadow:var(--shadow);scroll-margin-top:14px}
.setblock.complete{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold),var(--shadow)}
.setblock-head{padding:12px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:linear-gradient(180deg,var(--pnl2),var(--pnl))}
.sb-emoji{font-size:1.9rem}
.sb-title{font-weight:800;font-size:1.05rem}
.sb-title .num{color:var(--mut);font-weight:700;font-size:.8rem;margin-right:6px}
.sb-accchips{display:flex;gap:7px;flex-wrap:wrap;margin-left:auto}
.accchip{display:flex;align-items:center;gap:6px;background:var(--chip);border-radius:20px;padding:4px 10px;font-size:.74rem;font-weight:800}
.accchip .dot{width:9px;height:9px;border-radius:50%}
.accchip .mini{width:42px;height:6px;border-radius:6px;background:var(--ln);overflow:hidden}
.accchip .mini i{display:block;height:100%;border-radius:6px;transition:width .5s}

.set-scrollwrap{position:relative}
.set-scroll{display:flex;gap:14px;overflow-x:auto;overflow-y:hidden;padding:10px 14px 14px;cursor:grab;scroll-snap-type:x proximity;scroll-behavior:smooth}
.set-scroll.dragging{cursor:grabbing;scroll-behavior:auto;user-select:none}
.set-scroll.dragging .card{pointer-events:none}
.acct-col{flex:0 0 auto;width:clamp(286px,84vw,372px);scroll-snap-align:start;background:var(--pnl2);border:2px solid var(--ln);border-radius:16px;padding:10px}
.acct-col-head{display:flex;align-items:center;flex-wrap:wrap;gap:7px;padding:3px 3px 9px;border-bottom:2px solid var(--ln);margin-bottom:9px;font-weight:800}
.acct-col-head .dot{width:13px;height:13px;border-radius:50%;flex:0 0 auto}
.acct-col-head .ah-name{font-size:.94rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.acct-col-head .ah-count{margin-left:auto;font-size:.72rem;font-weight:900;background:var(--chip);padding:3px 9px;border-radius:20px;white-space:nowrap}
.acct-col-head .ah-bar{flex-basis:100%;height:6px;border-radius:6px;background:var(--ln);overflow:hidden;order:9}
.acct-col-head .ah-bar i{display:block;height:100%;border-radius:6px;transition:width .5s}
.sticker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.panel-empty{grid-column:1/-1;text-align:center;color:var(--mut);font-weight:800;font-size:.82rem;padding:26px 6px}
.scrollbtn{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:var(--acc);color:var(--accInk);font-size:1.05rem;font-weight:900;box-shadow:0 3px 12px rgba(0,0,0,.35);z-index:7;display:none;align-items:center;justify-content:center;border:3px solid var(--pnl)}
.setblock.has-overflow .scrollbtn{display:flex}
.scrollbtn:active{transform:translateY(-50%) scale(.88)}
.scrollbtn.left{left:6px}.scrollbtn.right{right:6px}
.scroll-hint{display:none;align-items:center;gap:4px;font-size:.64rem;font-weight:800;color:var(--mut);background:var(--chip);padding:3px 9px;border-radius:20px}
.setblock.has-overflow .scroll-hint{display:inline-flex}
.stars{color:var(--gold);font-size:.74rem;letter-spacing:-1px;text-shadow:0 1px 1px var(--goldDeep)}
.goldtag{font-size:.56rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--goldDeep));color:#3a2400;padding:2px 6px;border-radius:6px;margin-left:4px;letter-spacing:.5px}

/* sticker card (per account cell) */
.card{border:2px solid var(--ln);border-radius:14px;padding:9px 8px 8px;text-align:center;cursor:pointer;position:relative;background:var(--pnl2);transition:transform .12s,box-shadow .15s,filter .25s;user-select:none}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.card.gold{border-color:var(--gold);background:linear-gradient(180deg,color-mix(in srgb,var(--gold) 18%,var(--pnl2)),var(--pnl2));box-shadow:0 0 9px color-mix(in srgb,var(--gold) 45%,transparent)}
.card.gold.have{box-shadow:0 0 16px var(--gold),inset 0 0 0 1px var(--gold);animation:goldglow 2.4s ease-in-out infinite}
@keyframes goldglow{0%,100%{box-shadow:0 0 10px var(--gold)}50%{box-shadow:0 0 20px var(--gold)}}
.card.missing{filter:grayscale(1) opacity(.45);background:var(--pnl2)}
.card.missing:hover{filter:grayscale(.4) opacity(.8)}
.card .cic{font-size:1.85rem;line-height:1;display:block;transition:transform .2s}
.card.have .cic{animation:pop .35s ease}
@keyframes pop{0%{transform:scale(.4) rotate(-12deg)}60%{transform:scale(1.18) rotate(6deg)}100%{transform:scale(1)}}
.card .cstars{font-size:.66rem;color:var(--gold);margin-top:2px;letter-spacing:-1px}
.card .cname{font-size:.6rem;color:var(--mut);font-weight:700;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.have-badge{position:absolute;top:-7px;right:-7px;width:21px;height:21px;border-radius:50%;background:var(--good);color:#fff;font-size:.72rem;display:none;align-items:center;justify-content:center;box-shadow:0 2px 4px rgba(0,0,0,.3);font-weight:900}
.card.have .have-badge{display:flex}
.dupzone{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:7px}
.dupzone button{width:23px;height:23px;border-radius:8px;background:var(--acc2);color:#fff;font-weight:900;font-size:.95rem;line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 0 rgba(0,0,0,.25)}
.dupzone button:active{transform:translateY(2px);box-shadow:none}
.dupzone input{width:34px;text-align:center;border-radius:8px;border:2px solid var(--ln);background:var(--pnl);font-weight:800;font-size:.78rem;padding:3px 0;outline:none;-moz-appearance:textfield}
.dupzone input::-webkit-outer-spin-button,.dupzone input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.dupzone input.has{border-color:var(--good);color:var(--good)}

/* Special override for 6-star regular stickers */
.card.star-6 {
  border-color: #111820 !important; 
  background: #ffffff !important;
  box-shadow: 3px 4px 0px rgba(0,0,0,0.6), inset 0 0 0 4px #ffffff !important;
}

/* ----- generic cards/grids ----- */
.cards-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
.panel{background:var(--pnl);border:2px solid var(--ln);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
.panel h2{margin:0 0 12px;font-size:1.05rem;display:flex;align-items:center;gap:8px}
.bigbar{height:14px;border-radius:10px;background:var(--ln);overflow:hidden;margin:6px 0}
.bigbar i{display:block;height:100%;border-radius:10px;background:linear-gradient(90deg,var(--acc2),var(--acc));transition:width .7s cubic-bezier(.2,.9,.3,1)}
.bigbar.gold i{background:linear-gradient(90deg,var(--goldDeep),var(--gold))}
.statrow{display:flex;justify-content:space-between;font-size:.82rem;margin:5px 0;font-weight:600}
.statrow b{font-weight:900}
.kpi{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.kpi .box{flex:1;min-width:120px;background:var(--pnl);border:2px solid var(--ln);border-radius:16px;padding:12px 14px;box-shadow:var(--shadow)}
.kpi .box .v{font-size:1.7rem;font-weight:900;line-height:1}
.kpi .box .l{font-size:.72rem;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-top:3px}

/* ring */
.ring{--p:0;width:96px;height:96px;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--acc) calc(var(--p)*1%),var(--ln) 0);position:relative;flex:0 0 auto}
.ring::before{content:"";position:absolute;inset:9px;border-radius:50%;background:var(--pnl)}
.ring span{position:relative;font-weight:900;font-size:1.1rem}

/* account cards */
.acc-card{display:flex;flex-direction:column;gap:10px}
.acc-top{display:flex;align-items:center;gap:10px}
.avatar{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:1.6rem;flex:0 0 auto;box-shadow:0 3px 0 rgba(0,0,0,.18)}
.field{display:flex;flex-direction:column;gap:3px;font-size:.74rem;font-weight:700;color:var(--mut)}
.field input,.field select{padding:8px 10px;border-radius:10px;border:2px solid var(--ln);background:var(--pnl2);outline:none;font-weight:600}
.field input:focus{border-color:var(--acc)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.emoji-pick{display:flex;flex-wrap:wrap;gap:4px}
.emoji-pick button{font-size:1.15rem;width:32px;height:32px;border-radius:8px;background:var(--pnl2);border:2px solid transparent}
.emoji-pick button.sel{border-color:var(--acc);background:var(--chip)}

/* vault */
.vault-acc{margin-bottom:18px}
.tier{display:flex;align-items:center;gap:12px;margin:10px 0}
.tier .tier-ic{font-size:1.7rem;width:42px;text-align:center}
.tier .tier-body{flex:1}
.tier .tier-name{font-weight:800;font-size:.9rem;display:flex;justify-content:space-between}
.tier.maxed .tier-ic{animation:bob 1.3s infinite}
.dup-list{list-style:none;padding:0;margin:8px 0 0}
.dup-list li{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:10px;background:var(--pnl2);margin-bottom:5px}
.dup-list .rank{font-weight:900;color:var(--mut);width:22px;text-align:center}
.dup-list .dval{margin-left:auto;font-weight:900;color:var(--gold)}
.dup-list .nm{font-weight:700;font-size:.85rem;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* trades */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;align-items:end}
.trade-list{list-style:none;padding:0;margin:0}
.trade-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;background:var(--pnl2);margin-bottom:8px;flex-wrap:wrap}
.trade-row.done{opacity:.6}
.trade-row .tdate{font-weight:900;font-size:.74rem;background:var(--chip);padding:4px 8px;border-radius:8px;white-space:nowrap}
.trade-row .tflow{font-weight:800;font-size:.86rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.trade-row .arrow{color:var(--acc2);font-weight:900}
.trade-row .tstk{color:var(--mut);font-weight:700;font-size:.82rem}
.trade-row .tcheck{margin-left:auto;display:flex;align-items:center;gap:8px}
.trade-row .auto-tag{font-size:.58rem;font-weight:900;background:var(--acc2);color:#fff;padding:2px 6px;border-radius:6px}
.plan-day{margin-bottom:10px}
.plan-day h4{margin:0 0 5px;font-size:.85rem}
input[type=checkbox].big{width:22px;height:22px;accent-color:var(--good);cursor:pointer}

/* calendar */
.cal-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.cal-head h3{margin:0;font-size:1.1rem;min-width:170px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{text-align:center;font-size:.66rem;font-weight:900;color:var(--mut);text-transform:uppercase}
.cal-cell{min-height:62px;border-radius:12px;border:2px solid var(--ln);background:var(--pnl2);padding:5px;position:relative;cursor:default;transition:.12s}
.cal-cell.has{cursor:pointer;border-color:var(--acc)}
.cal-cell.has:hover{transform:scale(1.05);box-shadow:var(--shadow)}
.cal-cell.empty{background:transparent;border:none}
.cal-cell.today{box-shadow:inset 0 0 0 2px var(--acc2)}
.cal-cell .dn{font-weight:800;font-size:.78rem}
.cal-cell .cct{position:absolute;bottom:5px;left:5px;right:5px;display:flex;gap:3px;flex-wrap:wrap}
.cal-cell .pill{font-size:.6rem;font-weight:900;background:var(--acc);color:var(--accInk);border-radius:20px;padding:1px 6px}
.cal-cell .pill.done{background:var(--good);color:#fff}

/* settings theme grid */
.theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.theme-card{border-radius:16px;padding:12px;cursor:pointer;border:3px solid transparent;position:relative;overflow:hidden;color:#fff;min-height:84px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow)}
.theme-card.active{border-color:var(--ink);transform:scale(1.03)}
.theme-card .tc-name{font-weight:900;font-size:.9rem;z-index:1;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.theme-card .tc-emoji{font-size:1.6rem;z-index:1}
.theme-card .tc-dots{display:flex;gap:5px;z-index:1}
.theme-card .tc-dots i{width:13px;height:13px;border-radius:50%;box-shadow:0 0 0 1px rgba(255,255,255,.4)}

.setting-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--ln);flex-wrap:wrap}
.setting-row .sr-label{font-weight:800;flex:1;min-width:160px}
.setting-row .sr-label small{display:block;font-weight:600;color:var(--mut);font-size:.74rem}
.setting-row input[type=number]{width:80px;padding:8px;border-radius:10px;border:2px solid var(--ln);background:var(--pnl2);font-weight:800;text-align:center;outline:none}
.switch{width:52px;height:28px;border-radius:20px;background:var(--ln);position:relative;cursor:pointer;flex:0 0 auto;transition:.2s}
.switch i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch.on{background:var(--good)}
.switch.on i{left:27px}

/* empty state */
.empty{text-align:center;padding:50px 20px;color:var(--mut)}
.empty .em{font-size:3.5rem;display:block;margin-bottom:10px;animation:bob 2s infinite}
.empty h3{color:var(--ink);margin:6px 0}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(3px)}
.modal-bg.show{display:flex;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--pnl);border-radius:20px;max-width:460px;width:100%;max-height:84vh;overflow-y:auto;border:3px solid var(--acc);box-shadow:0 20px 60px rgba(0,0,0,.5);animation:popin .25s}
@keyframes popin{from{transform:scale(.85) translateY(20px);opacity:0}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:2px solid var(--ln);position:sticky;top:0;background:var(--pnl)}
.modal-head h3{margin:0;flex:1;font-size:1.05rem}
.modal-body{padding:14px 16px}

/* confetti */
.confetti{position:fixed;top:-30px;font-size:1.4rem;z-index:200;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.2}}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--bg);padding:11px 20px;border-radius:30px;font-weight:800;font-size:.85rem;z-index:300;opacity:0;transition:.3s;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.scrim{position:fixed;inset:60px 0 0;background:rgba(0,0,0,.4);z-index:20;display:none}

<script>
"use strict";

/* ============================================================
   SUPABASE INTEGRATION & NETWORK LOGIC
   ============================================================ */
const SUPABASE_URL = "https://dvybpbfwkwnvxdosvsxj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_SK5m4nhUdE_7R1bgyKXXug_RE3AoBy3";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let activeSessionUser = null;
let currentCloudSheetId = null;
let myWebFriendCode = null;
let isDemoModeActive = localStorage.getItem("dohnut_demo_active") === "true";
let saveTimeout;

// Tracks which portal tab is currently active
let activeCommunityTab = 'network';

// Function to switch tabs and re-render
function switchCommunityTab(tabName) {
  activeCommunityTab = tabName;
  renderContent();
  if(tabName === 'network') {
    fetchFriendsList();
  }
}

async function loginWithProvider(providerName) {
  await supabaseClient.auth.signInWithOAuth({
    provider: providerName,
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
}

async function sendMagicOtp() {
  const emailInput = document.getElementById("magic-link-email").value.trim();
  const feedbackMsg = document.getElementById("auth-status-msg");
  if (!emailInput) { toast("Enter your email address!"); return; }
  
  feedbackMsg.textContent = "Sending link...";
  const { error } = await supabaseClient.auth.signInWithOtp({
    email: emailInput,
    options: { emailRedirectTo: window.location.origin + window.location.pathname }
  });
  
  if (error) {
    feedbackMsg.textContent = "❌ Error: " + error.message;
    feedbackMsg.style.color = "var(--bad)";
  } else {
    feedbackMsg.textContent = "🍩 Link sent! Check your inbox.";
    feedbackMsg.style.color = "var(--good)";
  }
}

function activateDemoMode() {
  isDemoModeActive = true;
  localStorage.setItem("dohnut_demo_active", "true");
  document.getElementById("auth-overlay").style.display = "none";
  toast("Loaded local offline profile 🎲");
  fullRender();
}

async function initializeWebAccount() {
  if (isDemoModeActive || !activeSessionUser) return;
  const { data: webAcc } = await supabaseClient
    .from('web_accounts')
    .select('web_friend_code, is_super_admin')
    .eq('id', activeSessionUser.id)
    .single();

  if (webAcc) {
    myWebFriendCode = webAcc.web_friend_code;
  } else {
    const { data: newAcc } = await supabaseClient
      .from('web_accounts')
      .insert({ id: activeSessionUser.id })
      .select('web_friend_code')
      .single();
    if (newAcc) myWebFriendCode = newAcc.web_friend_code;
  }
}

function copyWebCode() {
  if (!myWebFriendCode) return;
  navigator.clipboard.writeText(myWebFriendCode).then(() => { toast("Web Code copied! 📋"); });
}

async function sendFriendRequest() {
  const targetCode = document.getElementById('add-friend-input').value.trim();
  if (!targetCode) { toast("Enter a Web Code first! ⚠️"); return; }
  if (targetCode === myWebFriendCode) { toast("You can't add yourself! 🍩"); return; }

  const { data: targetUser } = await supabaseClient
    .from('web_accounts')
    .select('id')
    .eq('web_friend_code', targetCode)
    .single();

  if (!targetUser) { toast("No player found with that code. 🕵️‍♂️"); return; }

  const { error: insertErr } = await supabaseClient
    .from('friendships')
    .insert({ user_a: activeSessionUser.id, user_b: targetUser.id, status: 'pending' });

  if (insertErr) { toast("Request already exists! ⏳"); } 
  else { 
    toast("Friend request sent! 📨"); 
    document.getElementById('add-friend-input').value = "";
    fetchFriendsList();
  }
}

async function fetchFriendsList() {
  if (isDemoModeActive || !activeSessionUser) return;
  
  const { data: friendships, error } = await supabaseClient
    .from('friendships')
    .select(`
      id,
      status,
      user_a,
      user_b,
      web_accounts!friendships_user_a_fkey(web_friend_code),
      web_accounts!friendships_user_b_fkey(web_friend_code)
    `)
    .or(`user_a.eq.${activeSessionUser.id},user_b.eq.${activeSessionUser.id}`);

  const container = document.getElementById('friends-list');
  if (!container) return;
  container.innerHTML = '';

  if (!friendships || friendships.length === 0) {
    container.innerHTML = '<div style="color:var(--mut); font-weight:700; padding:10px;">Your Rolodex is empty!</div>';
    return;
  }

  friendships.forEach(f => {
    const isIncoming = f.user_b === activeSessionUser.id && f.status === 'pending';
    const friendCode = f.user_a === activeSessionUser.id ? f.web_accounts_user_b_fkey.web_friend_code : f.web_accounts_user_a_fkey.web_friend_code;
    
    const li = document.createElement('li');
    li.className = 'trade-row';
    li.style.cssText = isIncoming 
      ? "background: var(--chip); border: 3px solid #111820; border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px; margin-bottom:8px;"
      : "border: 3px solid #111820; border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px; margin-bottom:8px;";

    if (f.status === 'pending') {
      if (isIncoming) {
        li.innerHTML = `
          <span class="avatar" style="width:30px; height:30px; font-size:1rem; background:#e8a13a;">🍩</span>
          <span style="font-weight:800; font-size:0.9rem; flex:1;">Player (${friendCode})</span>
          <span class="auto-tag" style="background:var(--acc); color:var(--accInk);">Incoming</span>
          <button class="btn sm" onclick="updateFriendStatus('${f.id}', 'accepted')" style="margin-left:6px;">Accept</button>
          <button class="btn sm danger" onclick="updateFriendStatus('${f.id}', 'blocked')">✕</button>
        `;
      } else {
        li.innerHTML = `
          <span class="avatar" style="width:30px; height:30px; font-size:1rem; background:#5d7689;">☁️</span>
          <span style="font-weight:800; font-size:0.9rem; flex:1;">Sent to (${friendCode})</span>
          <span class="auto-tag" style="background:var(--goldDeep);">Sent</span>
        `;
      }
    } else if (f.status === 'accepted') {
      li.innerHTML = `
        <span class="avatar" style="width:30px; height:30px; font-size:1rem; background:#54bf3a;">🛹</span>
        <span style="font-weight:800; font-size:0.9rem; flex:1;">Friend (${friendCode})</span>
        <span style="font-size:0.75rem; font-weight:900; color:var(--mut);">Connected</span>
        <button class="btn sm ghost" style="margin-left:8px;">View Album</button>
      `;
    }
    container.appendChild(li);
  });
}

async function updateFriendStatus(friendshipId, newStatus) {
  const { error } = await supabaseClient
    .from('friendships')
    .update({ status: newStatus })
    .eq('id', friendshipId);

  if (!error) {
    toast(newStatus === 'accepted' ? "Friend request accepted! 🎉" : "Request updated.");
    fetchFriendsList();
  } else {
    toast("Action failed. ❌");
  }
}

async function handleSession(session) {
  if (!session) return;
  activeSessionUser = session.user;
  document.getElementById("auth-overlay").style.display = "none";
  toast("Connected to Cloud ☁️");
  
  await initializeWebAccount();

  const { data } = await supabaseClient.from('tracker_sheets').select('*').eq('user_id', activeSessionUser.id).single();
  if (data) {
    currentCloudSheetId = data.id;
    if(data.accounts) state.accounts = data.accounts;
    if(data.inventory) state.inv = data.inventory;
    if(data.trades) state.trades = data.trades;
  } else {
    const { data: newSheet } = await supabaseClient.from('tracker_sheets').insert({
      user_id: activeSessionUser.id,
      user_email: activeSessionUser.email,
      accounts: state.accounts,
      inventory: state.inv,
      trades: state.trades
    }).select().single();
    if(newSheet) currentCloudSheetId = newSheet.id;
  }
  fullRender();
  fetchFriendsList();
}

window.addEventListener("DOMContentLoaded", async () => {
  if (isDemoModeActive) {
     document.getElementById("auth-overlay").style.display = "none";
     fullRender();
     return;
  }
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) handleSession(session);
  else document.getElementById("auth-overlay").style.display = "flex";

  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN') handleSession(session);
    if (event === 'SIGNED_OUT') {
      activeSessionUser = null; myWebFriendCode = null;

function calendarHtml(){
  const y=calRef.getFullYear(),m=calRef.getMonth();
  const monthName=["January","February","March","April","May","June","July","August","September","October","November","December"][m];
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const byDate={};
  state.trades.forEach(t=>{(byDate[t.date]=byDate[t.date]||[]).push(t)});
  const today=todayStr();
  let cells="";
  const dows=["S","M","T","W","T","F","S"];
  cells+=dows.map(d=>`<div class="cal-dow">${d}</div>`).join("");
  for(let i=0;i<first;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=fmtDate(new Date(y,m,d));
    const tr=byDate[ds]||[];
    const done=tr.filter(t=>t.done).length, pend=tr.length-done;
    let pills="";
    if(pend) pills+=`<span class="pill">${pend}</span>`;
    if(done) pills+=`<span class="pill done">✓${done}</span>`;
    cells+=`<div class="cal-cell ${tr.length?"has":""} ${ds===today?"today":""}" ${tr.length?`data-action="open-day" data-date="${ds}"`:""}>
      <span class="dn">${d}</span><span class="cct">${pills}</span></div>`;
  }
  return `<div class="cal-head">
      <button class="btn ghost sm" data-action="cal-prev">◀</button>
      <h3>${monthName} ${y}</h3>
      <button class="btn ghost sm" data-action="cal-next">▶</button>
      <button class="btn ghost sm" data-action="cal-today" style="margin-left:auto">Today</button>
    </div>
    <div class="cal-grid">${cells}</div>`;
}

/* ============================================================
   SMART PLANNER ALGORITHM
   ============================================================ */
function generatePlan(){
  if(state.accounts.length<2){ toast("Need 2+ accounts"); return; }
  const HORIZON=14;
  const regLimit = state.settings.tradeFest?state.settings.tradeFestLimit:state.settings.regularLimit;
  const goldLimit = state.settings.goldBlitz?state.settings.goldBlitzLimit:0;

  const work={}; state.accounts.forEach(a=>{ work[a.id]={}; STICKERS.forEach(s=>work[a.id][s.id]=getCount(a.id,s.id)); });
  const give=(acc,sid)=>Math.max(0,work[acc][sid]-1);
  const need=(acc,sid)=>work[acc][sid]===0;

  let cands=[];
  STICKERS.forEach(s=>{
    if(s.isGold && !state.settings.goldBlitz) return;
    const givers=state.accounts.filter(a=>give(a.id,s.id)>0);
    const takers=state.accounts.filter(a=>need(a.id,s.id));
    givers.forEach(g=>takers.forEach(t=>{ if(g.id!==t.id) cands.push({s,from:g.id,to:t.id}); }));
  });

  cands.forEach(c=>{
    const s=c.s, set=ALBUM.find(x=>x.id===s.setId);
    const missing=set.stickers.filter(x=>work[c.to][x.id]===0);
    let score=s.stars, reason="";
    if(missing.length===1){ score+=1000; reason="completes set"; }
    else score+=(set.stickers.length-missing.length)*6;
    score+=Math.min(give(c.from,s.id),3)*3;
    score+=Math.max(0,vaultTotal(c.from)-vaultTotal(c.to))/50;
    if(s.isGold){ score+=25; if(!reason) reason="gold ⚡"; }
    c.score=score; c.reason=reason;
  });
  cands.sort((a,b)=>b.score-a.score);

  const sends={}; state.accounts.forEach(a=>sends[a.id]=Array.from({length:HORIZON},()=>({reg:0,gold:0})));
  const planned=new Set();
  const base=new Date(); base.setHours(0,0,0,0);
  const out=[];
  for(const c of cands){
    const key=c.to+"|"+c.s.id;
    if(planned.has(key)) continue;
    if(give(c.from,c.s.id)<=0) continue;
    const isGold=c.s.isGold, lim=isGold?goldLimit:regLimit;
    if(lim<=0) continue;
    let day=-1;
    for(let d=0;d<HORIZON;d++){ const sc=sends[c.from][d]; if((isGold?sc.gold:sc.reg)<lim){ day=d; break; } }
    if(day<0) continue;
    if(isGold) sends[c.from][day].gold++; else sends[c.from][day].reg++;
    work[c.from][c.s.id]--; work[c.to][c.s.id]++;
    planned.add(key);
    const dt=new Date(base); dt.setDate(dt.getDate()+day);
    out.push({id:uid(),from:c.from,to:c.to,setId:c.s.setId,sid:c.s.id,date:fmtDate(dt),done:false,auto:true,reason:c.reason});
  }
  plan=out;
  if(!out.length) toast("No useful trades found 🤷");
  else toast(`Planned ${out.length} trades over ${new Set(out.map(t=>t.date)).size} day(s) 🧠`);
  renderContent();
}
function applyPlan(){
  if(!plan.length) return;
  plan.forEach(t=>state.trades.push(t));
  const n=plan.length; plan=[]; save();
  toast(`Added ${n} trades to schedule ✅`);
  renderContent();
}

function setTradeDone(t,done){
  if(done===t.done) return;
  if(done){
    const fc=getCount(t.from,t.sid); if(fc>0) setCount(t.from,t.sid,fc-1);
    setCount(t.to,t.sid,getCount(t.to,t.sid)+1);
  }else{
    const tc=getCount(t.to,t.sid); if(tc>0) setCount(t.to,t.sid,tc-1);
    setCount(t.from,t.sid,getCount(t.from,t.sid)+1);
  }
  t.done=done; save();
}

/* ---- sticker interactions ---- */
function stickerToggle(acc,sid){
  const before=isSetComplete(acc,SBYID[sid].setId);
  const c=getCount(acc,sid); setCount(acc,sid,c>0?0:1);
  updateCell(acc,sid); refreshSetUI(SBYID[sid].setId);
  if(!before && isSetComplete(acc,SBYID[sid].setId)){ confetti(); toast("Set complete! 🎉"); }
}
function stickerDup(acc,sid,delta){
  const before=isSetComplete(acc,SBYID[sid].setId);
  setCount(acc,sid,getCount(acc,sid)+delta);
  updateCell(acc,sid); refreshSetUI(SBYID[sid].setId);
  if(!before && isSetComplete(acc,SBYID[sid].setId)){ confetti(); toast("Set complete! 🎉"); }
}
function stickerSetDup(acc,sid,val){
  const v=Math.max(0,parseInt(val)||0);
  const cur=getCount(acc,sid);
  setCount(acc,sid, v>0? v+1 : (cur>0?1:0));
  updateCell(acc,sid); refreshSetUI(SBYID[sid].setId);
}
function isSetComplete(acc,setId){
  const set=ALBUM.find(s=>s.id===setId);
  return set.stickers.every(s=>getCount(acc,s.id)>0);
}

/* ---- account actions ---- */
function addAccount(){
  const names=["Homer","Marge","Bart","Lisa","Maggie","Ned","Moe","Apu","Milhouse","Krusty","Burns","Ralph"];
  const used=state.accounts.map(a=>a.name);
  const name=names.find(n=>!used.includes(n))||("Player "+(state.accounts.length+1));
  const palette=["#5b8f3a","#4aa3d4","#e8a13a","#9b59b6","#e8533a","#16a085","#d4477a","#2c7fb8"];
  const color=palette[state.accounts.length%palette.length];
  const emoji=AVATARS[state.accounts.length%AVATARS.length];
  state.accounts.push({id:uid(),name,color,emoji});
  save(); renderContent(); renderSetList(); toast("Account added 👋");
}
function delAccount(id){
  const a=accById(id); if(!a) return;
  if(!confirm(`Delete "${a.name}"? This removes their inventory and any trades involving them.`)) return;
  state.accounts=state.accounts.filter(x=>x.id!==id);
  delete state.inv[id];
  state.trades=state.trades.filter(t=>t.from!==id&&t.to!==id);
  save(); renderContent(); renderSetList();
}
function setAccEmoji(id,e){ const a=accById(id); if(a){ a.emoji=e; save(); renderContent(); renderSetList(); } }

/* ---- trade actions ---- */
function addTrade(){
  const from=document.getElementById("t-from").value;
  const to=document.getElementById("t-to").value;
  const sid=document.getElementById("t-stk").value;
  const setId=+document.getElementById("t-set").value;
  const date=document.getElementById("t-date").value||todayStr();
  if(from===to){ toast("Sender and receiver must differ"); return; }
  if(!sid){ toast("Pick a sticker"); return; }
  state.trades.push({id:uid(),from,to,setId,sid,date,done:false,auto:false});
  save(); renderContent(); toast("Trade scheduled 🔄");
}
function delTrade(id){
  const t=state.trades.find(x=>x.id===id);
  if(t&&t.done){ if(!confirm("This trade is completed. Deleting won't undo the inventory change. Continue?")){return;} }
  state.trades=state.trades.filter(x=>x.id!==id); save(); renderContent();
}
function toggleEvent(ev){
  state.settings[ev]=!state.settings[ev]; save();
  renderBadges(); renderContent();
  toast((state.settings[ev]?"Enabled ":"Disabled ")+(ev==="goldBlitz"?"⚡ Gold Blitz":"🎉 Trade Fest"));
}

/* ---- data actions ---- */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const u=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=u; a.download="dohnut-album-backup.json"; a.click(); URL.revokeObjectURL(u);
  toast("Exported ⬇️");
}

/* ---- nav: jump to set ---- */
function jumpToSet(setId){
  document.querySelectorAll(".set-item").forEach(i=>i.classList.toggle("active",i.dataset.set===setId));
  if(state.page!=="album"){ gotoPage("album"); }
  closeDrawers();
  setTimeout(()=>{
    const el=document.getElementById("set-"+setId);
    if(el){ el.scrollIntoView({behavior:"smooth",block:"start"}); el.animate?.([{boxShadow:"0 0 0 4px var(--acc)"},{boxShadow:"var(--shadow)"}],{duration:900}); }
    else { toast("Set hidden by filters"); }
  },state.page!=="album"?80:0);
}

/* ============================================================
   HORIZONTAL ACCOUNT SCROLLING + COLLAPSIBLE NAV
   ============================================================ */
function scrollSet(btn){
  const wrap=btn.closest(".set-scrollwrap"); if(!wrap) return;
  const sc=wrap.querySelector(".set-scroll"); if(!sc) return;
  sc.scrollBy({left:(+btn.dataset.dir)*sc.clientWidth*0.85,behavior:"smooth"});
}
function updateScrollButtons(){
  document.querySelectorAll(".setblock").forEach(b=>{
    const sc=b.querySelector(".set-scroll"); if(!sc) return;
    b.classList.toggle("has-overflow", sc.scrollWidth-sc.clientWidth>8);
  });
}
function applyNavMode(){
  const auto=!!state.settings.navAuto;
  document.body.classList.toggle("nav-auto",auto);
  document.querySelectorAll(".pin-btn").forEach(b=>{ b.textContent=auto?"📌":"📍"; b.title=auto?"Pin sidebars open":"Auto-hide sidebars"; });
}
function toggleNav(){
  state.settings.navAuto=!state.settings.navAuto; save(); applyNavMode();
  if(state.page==="settings") renderContent();
}

let dragSt=null, justDragged=false;
document.addEventListener("pointerdown",e=>{
  const sc=e.target.closest(".set-scroll"); if(!sc) return;
  if(e.target.closest("input,button,select")) return;
  dragSt={sc,x:e.clientX,left:sc.scrollLeft,moved:false};
});
document.addEventListener("pointermove",e=>{
  if(!dragSt) return;
  const dx=e.clientX-dragSt.x;
  if(!dragSt.moved && Math.abs(dx)>5){ dragSt.moved=true; dragSt.sc.classList.add("dragging"); }
  if(dragSt.moved) dragSt.sc.scrollLeft=dragSt.left-dx;
});
function endDrag(){
  if(!dragSt) return;
  if(dragSt.moved){ justDragged=true; setTimeout(()=>{justDragged=false;},120); }
  dragSt.sc.classList.remove("dragging"); dragSt=null;
}
document.addEventListener("pointerup",endDrag);
document.addEventListener("pointercancel",endDrag);
window.addEventListener("resize",()=>{ if(state.page==="album") updateScrollButtons(); });

/* ============================================================
   BOOT
   ============================================================ */
function fullRender(){
  renderBadges(); renderSwatches(); renderSetList(); applyNavMode();
  document.querySelectorAll(".tool-btn").forEach(b=>b.classList.toggle("active",b.dataset.page===state.page));
  renderContent();
}
applyTheme(state.settings.theme||"springfield");
</script>
</body>
</html>
